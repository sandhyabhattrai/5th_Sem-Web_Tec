<!DOCTYPE html>
<html lang="en">
<head> 
    <title>Login</title>
    <h2> Enter your information to log in </h2>
    <style>
        h2{
            font-size: 30px;
            background-color: aliceblue;
            text-align: center;
            padding: 20px;
            margin-bottom: 40px;
            border-bottom: 2px solid rgb(0, 0, 0) ;
        }
        .form{
            padding: 20px;
            text-align: center;
            font-size: 20px;
        }
        div{
            text-align: center;
        }
    </style>
</head>
<body bgcolor="blue">
  
    <form action="" class="form" style="color:aliceblue;">
        E-mail:
        <input type="text" placeholder="Enter your email">
        <br>
        <br>
        Password:
        <input type="password" placeholder="Enter password">
        <br>
        <br>
        <div> 
            <button type="submit" margin="20px">Login</button>
        </div>
        
    </form>
    <br>
    <hr>
    <footer>Copyright&copy; Sandhya Bhattarai</footer>
</body>
</html>
